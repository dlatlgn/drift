<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Drift — 흘려보내기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0a0a12;
    color: #e8e8f0;
    font-family: -apple-system, 'Pretendard', 'Suit', system-ui, sans-serif;
    overflow-x: hidden;
    cursor: none;
  }
  html { scroll-snap-type: y mandatory; scroll-behavior: smooth; }

  section {
    position: relative;
    width: 100vw;
    height: 100vh;
    scroll-snap-align: start;
    overflow: hidden;
  }
  canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }

  .label {
    position: absolute;
    left: 48px; bottom: 48px;
    z-index: 2;
    pointer-events: none;
  }
  .label .num {
    font-size: 12px;
    letter-spacing: 0.3em;
    opacity: 0.4;
    margin-bottom: 8px;
  }
  .label .title {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 0.05em;
  }
  .label .sub {
    font-size: 13px;
    opacity: 0.45;
    margin-top: 6px;
    letter-spacing: 0.02em;
  }

  .nav {
    position: fixed;
    right: 32px; top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .nav a {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(232,232,240,0.25);
    transition: all 0.4s ease;
    cursor: pointer;
  }
  .nav a.active {
    background: #e8e8f0;
    transform: scale(1.6);
  }

  .hint {
    position: fixed;
    left: 50%; bottom: 24px;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.3em;
    opacity: 0.35;
    z-index: 10;
    pointer-events: none;
    animation: fade 3s ease-in-out infinite;
  }
  @keyframes fade {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.5; }
  }

  #cursor {
    position: fixed;
    width: 24px; height: 24px;
    border: 1px solid rgba(232,232,240,0.6);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 100;
    transition: width 0.2s, height 0.2s, background 0.2s;
    mix-blend-mode: difference;
  }
  #cursor.dot {
    width: 6px; height: 6px;
    background: #e8e8f0;
  }
</style>
</head>
<body>

<div id="cursor"></div>

<nav class="nav">
  <a data-i="0" class="active"></a>
  <a data-i="1"></a>
  <a data-i="2"></a>
  <a data-i="3"></a>
  <a data-i="4"></a>
  <a data-i="5"></a>
  <a data-i="6"></a>
</nav>

<div class="hint">SCROLL ↓</div>

<section id="s0">
  <canvas id="c0"></canvas>
  <div class="label">
    <div class="num">01 / 07</div>
    <div class="title">Constellation</div>
    <div class="sub">별자리를 그려보세요</div>
  </div>
</section>

<section id="s1">
  <canvas id="c1"></canvas>
  <div class="label">
    <div class="num">02 / 07</div>
    <div class="title">Ripple Field</div>
    <div class="sub">잔잔한 수면을 흔들어보세요</div>
  </div>
</section>

<section id="s2">
  <canvas id="c2"></canvas>
  <div class="label">
    <div class="num">03 / 07</div>
    <div class="title">Gravity Well</div>
    <div class="sub">중력의 궤도를 만들어보세요</div>
  </div>
</section>

<section id="s3">
  <canvas id="c3"></canvas>
  <div class="label">
    <div class="num">04 / 07</div>
    <div class="title">Silk Trail</div>
    <div class="sub">실을 늘어뜨려보세요</div>
  </div>
</section>

<section id="s4">
  <canvas id="c4"></canvas>
  <div class="label">
    <div class="num">05 / 07</div>
    <div class="title">Aurora Wave</div>
    <div class="sub">빛의 커튼을 흔들어보세요</div>
  </div>
</section>

<section id="s5">
  <canvas id="c5"></canvas>
  <div class="label">
    <div class="num">06 / 07</div>
    <div class="title">Firefly Garden</div>
    <div class="sub">반딧불을 불러보세요</div>
  </div>
</section>

<section id="s6">
  <canvas id="c6"></canvas>
  <div class="label">
    <div class="num">07 / 07</div>
    <div class="title">Ink Bloom</div>
    <div class="sub">잉크를 흩뿌려보세요</div>
  </div>
</section>

<script>
/* ===================== 공통 ===================== */
const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2, active: false, sectionY: 0 };
const cursor = document.getElementById('cursor');

window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});
window.addEventListener('mousedown', () => cursor.classList.add('dot'));
window.addEventListener('mouseup', () => cursor.classList.remove('dot'));

function setup(canvas) {
  const dpr = window.devicePixelRatio || 1;
  const ctx = canvas.getContext('2d');
  const resize = () => {
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  };
  resize();
  window.addEventListener('resize', resize);
  return ctx;
}

/* 씬별 활성 여부 (성능) */
const active = [true, false, false, false, false, false, false];
const sections = document.querySelectorAll('section');
const navDots = document.querySelectorAll('.nav a');

const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    const i = [...sections].indexOf(e.target);
    if (i < 0) return;
    active[i] = e.isIntersecting;
    if (e.isIntersecting) {
      navDots.forEach(d => d.classList.remove('active'));
      navDots[i].classList.add('active');
    }
  });
}, { threshold: 0.5 });
sections.forEach(s => io.observe(s));

navDots.forEach(d => {
  d.addEventListener('click', () => {
    const i = +d.dataset.i;
    sections[i].scrollIntoView({ behavior: 'smooth' });
  });
});

/* 마우스가 현재 어느 섹션에 있는지 상대 좌표로 계산 */
function localMouse(canvas) {
  const rect = canvas.getBoundingClientRect();
  return { x: mouse.x - rect.left, y: mouse.y - rect.top };
}

/* ===================== 씬 1: Constellation ===================== */
(() => {
  const canvas = document.getElementById('c0');
  const ctx = setup(canvas);
  const N = 90;
  const pts = [];
  for (let i = 0; i < N; i++) {
    pts.push({
      x: Math.random() * innerWidth,
      y: Math.random() * innerHeight,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
    });
  }

  function draw() {
    requestAnimationFrame(draw);
    if (!active[0]) return;
    const W = innerWidth, H = innerHeight;
    ctx.fillStyle = 'rgba(10,10,18,0.35)';
    ctx.fillRect(0, 0, W, H);

    const m = localMouse(canvas);
    for (const p of pts) {
      // 마우스 인력
      const dx = m.x - p.x, dy = m.y - p.y;
      const d2 = dx * dx + dy * dy;
      if (d2 < 40000) {
        const f = (40000 - d2) / 40000 * 0.04;
        p.vx += dx / Math.sqrt(d2 + 1) * f;
        p.vy += dy / Math.sqrt(d2 + 1) * f;
      }
      p.vx *= 0.98; p.vy *= 0.98;
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    }

    // 라인
    ctx.lineWidth = 0.5;
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 140) {
          const a = (1 - d / 140) * 0.4;
          ctx.strokeStyle = `rgba(180,200,255,${a})`;
          ctx.beginPath();
          ctx.moveTo(pts[i].x, pts[i].y);
          ctx.lineTo(pts[j].x, pts[j].y);
          ctx.stroke();
        }
      }
    }
    // 마우스 연결
    for (const p of pts) {
      const dx = m.x - p.x, dy = m.y - p.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 180) {
        ctx.strokeStyle = `rgba(255,220,180,${(1 - d / 180) * 0.7})`;
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(m.x, m.y);
        ctx.stroke();
      }
    }
    // 점
    for (const p of pts) {
      ctx.fillStyle = 'rgba(220,230,255,0.9)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 1.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  draw();
})();

/* ===================== 씬 2: Ripple Field ===================== */
(() => {
  const canvas = document.getElementById('c1');
  const ctx = setup(canvas);
  const SPACING = 30;
  let cols, rows, grid;

  function build() {
    cols = Math.ceil(innerWidth / SPACING) + 2;
    rows = Math.ceil(innerHeight / SPACING) + 2;
    grid = [];
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        grid.push({
          ox: x * SPACING, oy: y * SPACING,
          x: x * SPACING, y: y * SPACING,
        });
      }
    }
  }
  build();
  window.addEventListener('resize', build);

  const ripples = [];
  window.addEventListener('click', e => {
    if (!active[1]) return;
    const rect = canvas.getBoundingClientRect();
    if (e.clientY < rect.top || e.clientY > rect.bottom) return;
    ripples.push({ x: e.clientX, y: e.clientY - rect.top, r: 0, life: 1 });
  });

  function draw() {
    requestAnimationFrame(draw);
    if (!active[1]) return;
    const W = innerWidth, H = innerHeight;
    ctx.fillStyle = 'rgba(10,10,18,1)';
    ctx.fillRect(0, 0, W, H);

    const m = localMouse(canvas);

    // 파동 업데이트
    for (let i = ripples.length - 1; i >= 0; i--) {
      ripples[i].r += 6;
      ripples[i].life -= 0.008;
      if (ripples[i].life <= 0) ripples.splice(i, 1);
    }

    for (const p of grid) {
      // 마우스 밀어내기
      let dx = p.ox - m.x, dy = p.oy - m.y;
      let d = Math.sqrt(dx * dx + dy * dy);
      let px = p.ox, py = p.oy;
      if (d < 150 && d > 0) {
        const f = (150 - d) / 150;
        px += (dx / d) * f * 25;
        py += (dy / d) * f * 25;
      }
      // 파동 영향
      for (const r of ripples) {
        const rdx = p.ox - r.x, rdy = p.oy - r.y;
        const rd = Math.sqrt(rdx * rdx + rdy * rdy);
        const diff = Math.abs(rd - r.r);
        if (diff < 40) {
          const f = (1 - diff / 40) * r.life * 20;
          px += (rdx / (rd + 1)) * f;
          py += (rdy / (rd + 1)) * f;
        }
      }
      // 부드럽게
      p.x += (px - p.x) * 0.15;
      p.y += (py - p.y) * 0.15;

      const dist = Math.hypot(p.x - p.ox, p.y - p.oy);
      const glow = Math.min(dist / 20, 1);

      ctx.fillStyle = `rgba(${180 + glow * 75},${200 + glow * 30},255,${0.3 + glow * 0.7})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 1 + glow * 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  draw();
})();

/* ===================== 씬 3: Gravity Well ===================== */
(() => {
  const canvas = document.getElementById('c2');
  const ctx = setup(canvas);
  const N = 220;
  const orbs = [];
  for (let i = 0; i < N; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 100 + Math.random() * 300;
    orbs.push({
      x: innerWidth / 2 + Math.cos(angle) * dist,
      y: innerHeight / 2 + Math.sin(angle) * dist,
      vx: -Math.sin(angle) * 1.5,
      vy: Math.cos(angle) * 1.5,
      hue: Math.random() * 60 + 200,
      trail: [],
    });
  }

  function draw() {
    requestAnimationFrame(draw);
    if (!active[2]) return;
    const W = innerWidth, H = innerHeight;
    ctx.fillStyle = 'rgba(10,10,18,0.15)';
    ctx.fillRect(0, 0, W, H);

    const m = localMouse(canvas);
    const cx = mouse.active ? m.x : W / 2;
    const cy = mouse.active ? m.y : H / 2;

    for (const o of orbs) {
      const dx = cx - o.x, dy = cy - o.y;
      const d2 = dx * dx + dy * dy;
      const d = Math.sqrt(d2);
      const force = Math.min(400 / (d2 + 100), 0.6);
      o.vx += (dx / d) * force;
      o.vy += (dy / d) * force;
      o.vx *= 0.995; o.vy *= 0.995;
      o.x += o.vx; o.y += o.vy;

      o.trail.push({ x: o.x, y: o.y });
      if (o.trail.length > 12) o.trail.shift();

      // 트레일
      ctx.strokeStyle = `hsla(${o.hue},70%,70%,0.4)`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      for (let i = 0; i < o.trail.length; i++) {
        const t = o.trail[i];
        if (i === 0) ctx.moveTo(t.x, t.y);
        else ctx.lineTo(t.x, t.y);
      }
      ctx.stroke();

      // 점
      ctx.fillStyle = `hsla(${o.hue},80%,80%,0.9)`;
      ctx.beginPath();
      ctx.arc(o.x, o.y, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // 중심 글로우
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60);
    grad.addColorStop(0, 'rgba(255,220,180,0.3)');
    grad.addColorStop(1, 'rgba(255,220,180,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, 60, 0, Math.PI * 2);
    ctx.fill();
  }
  draw();
})();

/* ===================== 씬 4: Silk Trail ===================== */
(() => {
  const canvas = document.getElementById('c3');
  const ctx = setup(canvas);
  const STRANDS = 14;
  const NODES = 26;
  const SPACING = 7;
  const GRAVITY = 0.12;
  const strands = [];

  for (let i = 0; i < STRANDS; i++) {
    const nodes = [];
    for (let j = 0; j < NODES; j++) {
      nodes.push({ x: 0, y: 0, px: 0, py: 0 });
    }
    strands.push({
      nodes,
      angle: (i / STRANDS) * Math.PI * 2,
      hue: 200 + i * 7,
    });
  }

  let target = { x: innerWidth / 2, y: innerHeight / 2 };
  let wasActive = false;

  function resetNodes() {
    const m = localMouse(canvas);
    target.x = m.x; target.y = m.y;
    for (const s of strands) {
      for (let j = 0; j < NODES; j++) {
        const x = m.x + Math.cos(s.angle) * 8;
        const y = m.y + Math.sin(s.angle) * 8 + j * SPACING;
        s.nodes[j].x = x; s.nodes[j].y = y;
        s.nodes[j].px = x; s.nodes[j].py = y;
      }
    }
  }

  function draw() {
    requestAnimationFrame(draw);
    if (!active[3]) { wasActive = false; return; }
    const W = innerWidth, H = innerHeight;

    if (!wasActive) {
      resetNodes();
      ctx.fillStyle = 'rgba(10,10,18,1)';
      ctx.fillRect(0, 0, W, H);
      wasActive = true;
    }

    ctx.fillStyle = 'rgba(10,10,18,0.18)';
    ctx.fillRect(0, 0, W, H);

    const m = localMouse(canvas);
    target.x += (m.x - target.x) * 0.22;
    target.y += (m.y - target.y) * 0.22;

    for (const s of strands) {
      // 헤드: 커서 주변에 부챗살처럼 고정
      const off = 10;
      const tx = target.x + Math.cos(s.angle) * off;
      const ty = target.y + Math.sin(s.angle) * off;
      s.nodes[0].x = tx; s.nodes[0].y = ty;
      s.nodes[0].px = tx; s.nodes[0].py = ty;

      // Verlet 적분 (헤드 제외)
      for (let i = 1; i < NODES; i++) {
        const n = s.nodes[i];
        const vx = (n.x - n.px) * 0.98;
        const vy = (n.y - n.py) * 0.98;
        n.px = n.x; n.py = n.y;
        n.x += vx;
        n.y += vy + GRAVITY;
      }

      // 거리 제약 (여러 번 반복해 안정화)
      for (let iter = 0; iter < 4; iter++) {
        for (let i = 0; i < NODES - 1; i++) {
          const a = s.nodes[i];
          const b = s.nodes[i + 1];
          const dx = b.x - a.x, dy = b.y - a.y;
          const d = Math.sqrt(dx * dx + dy * dy) || 0.001;
          const diff = (d - SPACING) / d * 0.5;
          const mx = dx * diff, my = dy * diff;
          if (i === 0) {
            b.x -= mx * 2; b.y -= my * 2;
          } else {
            a.x += mx; a.y += my;
            b.x -= mx; b.y -= my;
          }
        }
      }

      // 곡선 그리기
      ctx.strokeStyle = `hsla(${s.hue},70%,78%,0.55)`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(s.nodes[0].x, s.nodes[0].y);
      for (let i = 1; i < NODES - 1; i++) {
        const xc = (s.nodes[i].x + s.nodes[i + 1].x) / 2;
        const yc = (s.nodes[i].y + s.nodes[i + 1].y) / 2;
        ctx.quadraticCurveTo(s.nodes[i].x, s.nodes[i].y, xc, yc);
      }
      const last = s.nodes[NODES - 1];
      ctx.lineTo(last.x, last.y);
      ctx.stroke();

      // 끝점 매듭 (미묘한 하이라이트)
      ctx.fillStyle = `hsla(${s.hue},80%,85%,0.7)`;
      ctx.beginPath();
      ctx.arc(last.x, last.y, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  draw();
})();

/* ===================== 씬 5: Aurora Wave ===================== */
(() => {
  const canvas = document.getElementById('c4');
  const ctx = setup(canvas);
  const LINES = 42;
  const pulses = [];
  const RING = 55;
  let t = 0;

  window.addEventListener('click', e => {
    if (!active[4]) return;
    const rect = canvas.getBoundingClientRect();
    if (e.clientY < rect.top || e.clientY > rect.bottom) return;
    pulses.push({
      x: e.clientX,
      y: e.clientY - rect.top,
      r: 0,
      life: 1,
      hue: 160 + Math.random() * 80,
    });
  });

  function draw() {
    requestAnimationFrame(draw);
    if (!active[4]) return;
    const W = innerWidth, H = innerHeight;
    ctx.fillStyle = 'rgba(10,10,18,0.18)';
    ctx.fillRect(0, 0, W, H);

    t += 0.006;
    const m = localMouse(canvas);

    // 파동 진행
    for (let i = pulses.length - 1; i >= 0; i--) {
      pulses[i].r += 11;
      pulses[i].life -= 0.008;
      if (pulses[i].life <= 0) pulses.splice(i, 1);
    }

    for (let l = 0; l < LINES; l++) {
      const yBase = (l / (LINES - 1)) * H;
      const hue = 170 + l * 3.2;

      // 라인의 실제 좌표를 미리 계산해서 저장
      const pts = [];
      for (let x = 0; x <= W; x += 5) {
        const dy = yBase - m.y;
        const dx = x - m.x;
        const d = Math.sqrt(dx * dx + dy * dy);
        const influence = Math.exp(-d / 200) * 55;
        let wave =
          Math.sin(x * 0.008 + t * 2.2 + l * 0.28) * 28 +
          Math.sin(x * 0.021 + t * 3.1 - l * 0.19) * 14 +
          Math.cos(x * 0.004 - t * 1.4 + l * 0.6) * 10;

        // 클릭 파동이 라인을 밀어냄
        for (const p of pulses) {
          const pdx = x - p.x, pdy = yBase - p.y;
          const pd = Math.sqrt(pdx * pdx + pdy * pdy);
          const diff = Math.abs(pd - p.r);
          if (diff < RING) {
            const f = (1 - diff / RING) * p.life * 50;
            wave += (pdy / (pd + 1)) * f;
          }
        }

        const y = yBase + wave + influence * Math.sin(t * 4 + l * 0.5);
        pts.push({ x, y });
      }

      // 오로라 기본 라인
      ctx.strokeStyle = `hsla(${hue},70%,68%,0.28)`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i < pts.length; i++) {
        if (i === 0) ctx.moveTo(pts[i].x, pts[i].y);
        else ctx.lineTo(pts[i].x, pts[i].y);
      }
      ctx.stroke();

      // 파동 링에 걸리는 구간만 라인 위에 빛으로 덧그리기
      for (const p of pulses) {
        for (let i = 0; i < pts.length - 1; i++) {
          const a = pts[i], b = pts[i + 1];
          const pdx = a.x - p.x, pdy = a.y - p.y;
          const pd = Math.sqrt(pdx * pdx + pdy * pdy);
          const diff = Math.abs(pd - p.r);
          if (diff < RING) {
            const bright = (1 - diff / RING) * p.life;
            // 안쪽 밝은 코어
            ctx.strokeStyle = `hsla(${p.hue},95%,88%,${bright * 0.95})`;
            ctx.lineWidth = 1 + bright * 1.4;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
            // 바깥 은은한 광채
            ctx.strokeStyle = `hsla(${p.hue},90%,72%,${bright * 0.35})`;
            ctx.lineWidth = 3 + bright * 3;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
      ctx.lineWidth = 1;
    }
  }
  draw();
})();

/* ===================== 씬 6: Firefly Garden ===================== */
(() => {
  const canvas = document.getElementById('c5');
  const ctx = setup(canvas);
  const N = 85;
  const flies = [];
  const sparks = [];
  const prevM = { x: 0, y: 0, vx: 0, vy: 0, init: false };
  let flash = 0;

  for (let i = 0; i < N; i++) {
    flies.push({
      x: Math.random() * innerWidth,
      y: Math.random() * innerHeight,
      vx: 0, vy: 0,
      phase: Math.random() * Math.PI * 2,
      pulse: 0.6 + Math.random() * 0.9,
      noise: Math.random() * 1000,
      hue: 40 + Math.random() * 20,
      excited: 0,
    });
  }

  window.addEventListener('click', e => {
    if (!active[5]) return;
    const rect = canvas.getBoundingClientRect();
    if (e.clientY < rect.top || e.clientY > rect.bottom) return;
    const cx = e.clientX, cy = e.clientY - rect.top;
    flash = 1;
    // 근처 반딧불이 활성화되어 클릭 지점으로 몰림
    for (const f of flies) {
      const dx = cx - f.x, dy = cy - f.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 480) {
        const e = (480 - d) / 480;
        f.excited = Math.max(f.excited, e);
        // 강한 인력 임펄스
        f.vx += (dx / (d + 1)) * e * 4;
        f.vy += (dy / (d + 1)) * e * 4;
      }
    }
    // 스파크가 사방으로 흩어짐
    for (let i = 0; i < 14; i++) {
      const ang = (i / 14) * Math.PI * 2 + Math.random() * 0.4;
      const spd = 2.5 + Math.random() * 4;
      sparks.push({
        x: cx, y: cy,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        life: 1,
        hue: 40 + Math.random() * 25,
      });
    }
  });

  function draw() {
    requestAnimationFrame(draw);
    if (!active[5]) return;
    const W = innerWidth, H = innerHeight;
    ctx.fillStyle = 'rgba(10,10,18,0.22)';
    ctx.fillRect(0, 0, W, H);

    const m = localMouse(canvas);
    if (!prevM.init) { prevM.x = m.x; prevM.y = m.y; prevM.init = true; }
    prevM.vx = m.x - prevM.x;
    prevM.vy = m.y - prevM.y;
    prevM.x = m.x; prevM.y = m.y;
    const speed = Math.sqrt(prevM.vx * prevM.vx + prevM.vy * prevM.vy);
    const now = performance.now() * 0.001;

    flash *= 0.93;
    if (flash > 0.02) {
      ctx.fillStyle = `rgba(255,240,170,${flash * 0.08})`;
      ctx.fillRect(0, 0, W, H);
    }

    for (const f of flies) {
      f.noise += 0.012;
      f.vx += Math.sin(f.noise * 0.7 + f.phase) * 0.05;
      f.vy += Math.cos(f.noise * 1.1 - f.phase) * 0.05;

      const dx = m.x - f.x, dy = m.y - f.y;
      const d = Math.sqrt(dx * dx + dy * dy);

      // 천천히 움직이면 이끌림, 빠르게 움직이면 밀려남
      if (d < 260 && d > 0) {
        const scatter = Math.min(speed / 25, 1);
        const attract = (260 - d) / 260 * 0.04 * (1 - scatter);
        const repel = scatter * (260 - d) / 260 * 0.5;
        f.vx += (dx / d) * attract - (dx / d) * repel;
        f.vy += (dy / d) * attract - (dy / d) * repel;
      }

      f.excited *= 0.95;

      f.vx *= 0.93; f.vy *= 0.93;
      f.x += f.vx; f.y += f.vy;

      if (f.x < 0) f.x = W; if (f.x > W) f.x = 0;
      if (f.y < 0) f.y = H; if (f.y > H) f.y = 0;

      const glow = (Math.sin(now * f.pulse + f.phase) + 1) * 0.5;
      const brightness = Math.min(1, glow + f.excited * 0.9);

      const rad = 14 + f.excited * 22;
      const grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, rad);
      grad.addColorStop(0, `hsla(${f.hue},95%,75%,${0.35 + brightness * 0.45})`);
      grad.addColorStop(1, `hsla(${f.hue},95%,55%,0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(f.x, f.y, rad, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = `hsla(${f.hue + 10},100%,90%,${0.65 + brightness * 0.35})`;
      ctx.beginPath();
      ctx.arc(f.x, f.y, 1 + brightness * 1.9, 0, Math.PI * 2);
      ctx.fill();
    }

    // 클릭 스파크
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.x += s.vx; s.y += s.vy;
      s.vx *= 0.94; s.vy *= 0.94;
      s.life -= 0.022;
      if (s.life <= 0) { sparks.splice(i, 1); continue; }

      const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 12);
      g.addColorStop(0, `hsla(${s.hue},100%,80%,${s.life * 0.75})`);
      g.addColorStop(1, `hsla(${s.hue},100%,60%,0)`);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(s.x, s.y, 12, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = `hsla(${s.hue + 10},100%,92%,${s.life})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, 1.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  draw();
})();

/* ===================== 씬 7: Ink Bloom ===================== */
(() => {
  const canvas = document.getElementById('c6');
  const ctx = setup(canvas);
  const blooms = [];
  const prev = { x: 0, y: 0, init: false };
  let hue = 220;
  let hueDir = 0.15;

  window.addEventListener('click', e => {
    if (!active[6]) return;
    const rect = canvas.getBoundingClientRect();
    if (e.clientY < rect.top || e.clientY > rect.bottom) return;
    const cx = e.clientX, cy = e.clientY - rect.top;
    const baseHue = 190 + Math.random() * 120;
    for (let i = 0; i < 10; i++) {
      const angle = (i / 10) * Math.PI * 2 + Math.random() * 0.4;
      const dist = 6 + Math.random() * 45;
      blooms.push({
        x: cx + Math.cos(angle) * dist,
        y: cy + Math.sin(angle) * dist,
        r: 0,
        maxR: 90 + Math.random() * 120,
        hue: baseHue + (Math.random() - 0.5) * 35,
        life: 1,
        decay: 0.004 + Math.random() * 0.003,
      });
    }
  });

  function draw() {
    requestAnimationFrame(draw);
    if (!active[6]) { prev.init = false; return; }
    const W = innerWidth, H = innerHeight;
    ctx.fillStyle = 'rgba(10,10,18,0.035)';
    ctx.fillRect(0, 0, W, H);

    const m = localMouse(canvas);
    hue += hueDir;
    if (hue > 320 || hue < 180) hueDir *= -1;

    if (m.y >= 0 && m.y <= H && m.x >= 0 && m.x <= W) {
      if (!prev.init) { prev.x = m.x; prev.y = m.y; prev.init = true; }
      const dx = m.x - prev.x, dy = m.y - prev.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d > 3) {
        // 이전 지점과 현재 지점 사이를 촘촘히 보간해 이어지게
        const step = 5;
        const count = Math.min(Math.ceil(d / step), 12);
        for (let i = 1; i <= count; i++) {
          const tt = i / count;
          blooms.push({
            x: prev.x + dx * tt + (Math.random() - 0.5) * 5,
            y: prev.y + dy * tt + (Math.random() - 0.5) * 5,
            r: 0,
            maxR: 38 + Math.random() * 55,
            hue: hue + (Math.random() - 0.5) * 25,
            life: 1,
            decay: 0.013 + Math.random() * 0.006,
          });
        }
        prev.x = m.x; prev.y = m.y;
      }
    } else {
      prev.init = false;
    }

    for (let i = blooms.length - 1; i >= 0; i--) {
      const b = blooms[i];
      b.r += (b.maxR - b.r) * 0.07;
      b.life -= b.decay;
      if (b.life <= 0) { blooms.splice(i, 1); continue; }

      const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
      grad.addColorStop(0, `hsla(${b.hue},72%,70%,${b.life * 0.16})`);
      grad.addColorStop(0.45, `hsla(${b.hue},72%,55%,${b.life * 0.07})`);
      grad.addColorStop(1, `hsla(${b.hue},72%,40%,0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  draw();
})();
</script>
