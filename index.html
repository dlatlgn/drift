<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Drift — 흘려보내기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0a0a12;
    color: #e8e8f0;
    font-family: -apple-system, 'Pretendard', 'Suit', system-ui, sans-serif;
    overflow-x: hidden;
    cursor: none;
  }
  html { scroll-snap-type: y mandatory; scroll-behavior: smooth; }

  section {
    position: relative;
    width: 100vw;
    height: 100vh;
    scroll-snap-align: start;
    overflow: hidden;
  }
  canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }

  .label {
    position: absolute;
    left: 48px; bottom: 48px;
    z-index: 2;
    pointer-events: none;
  }
  .label .num {
    font-size: 12px;
    letter-spacing: 0.3em;
    opacity: 0.4;
    margin-bottom: 8px;
  }
  .label .title {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 0.05em;
  }
  .label .sub {
    font-size: 13px;
    opacity: 0.45;
    margin-top: 6px;
    letter-spacing: 0.02em;
  }

  .nav {
    position: fixed;
    right: 32px; top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .nav a {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(232,232,240,0.25);
    transition: all 0.4s ease;
    cursor: pointer;
  }
  .nav a.active {
    background: #e8e8f0;
    transform: scale(1.6);
  }

  .hint {
    position: fixed;
    left: 50%; bottom: 24px;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.3em;
    opacity: 0.35;
    z-index: 10;
    pointer-events: none;
    animation: fade 3s ease-in-out infinite;
  }
  @keyframes fade {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.5; }
  }

  #cursor {
    position: fixed;
    width: 24px; height: 24px;
    border: 1px solid rgba(232,232,240,0.6);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 100;
    transition: width 0.2s, height 0.2s, background 0.2s;
    mix-blend-mode: difference;
  }
  #cursor.dot {
    width: 6px; height: 6px;
    background: #e8e8f0;
  }
</style>
</head>
<body>

<div id="cursor"></div>

<nav class="nav">
  <a data-i="0" class="active"></a>
  <a data-i="1"></a>
  <a data-i="2"></a>
  <a data-i="3"></a>
</nav>

<div class="hint">SCROLL ↓</div>

<section id="s0">
  <canvas id="c0"></canvas>
  <div class="label">
    <div class="num">01 / 04</div>
    <div class="title">Constellation</div>
    <div class="sub">별자리를 그려보세요</div>
  </div>
</section>

<section id="s1">
  <canvas id="c1"></canvas>
  <div class="label">
    <div class="num">02 / 04</div>
    <div class="title">Ripple Field</div>
    <div class="sub">잔잔한 수면을 흔들어보세요</div>
  </div>
</section>

<section id="s2">
  <canvas id="c2"></canvas>
  <div class="label">
    <div class="num">03 / 04</div>
    <div class="title">Gravity Well</div>
    <div class="sub">중력의 궤도를 만들어보세요</div>
  </div>
</section>

<section id="s3">
  <canvas id="c3"></canvas>
  <div class="label">
    <div class="num">04 / 04</div>
    <div class="title">Silk Trail</div>
    <div class="sub">실을 늘어뜨려보세요</div>
  </div>
</section>

<script>
/* ===================== 공통 ===================== */
const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2, active: false, sectionY: 0 };
const cursor = document.getElementById('cursor');

window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});
window.addEventListener('mousedown', () => cursor.classList.add('dot'));
window.addEventListener('mouseup', () => cursor.classList.remove('dot'));

function setup(canvas) {
  const dpr = window.devicePixelRatio || 1;
  const ctx = canvas.getContext('2d');
  const resize = () => {
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  };
  resize();
  window.addEventListener('resize', resize);
  return ctx;
}

/* 씬별 활성 여부 (성능) */
const active = [true, false, false, false];
const sections = document.querySelectorAll('section');
const navDots = document.querySelectorAll('.nav a');

const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    const i = [...sections].indexOf(e.target);
    if (i < 0) return;
    active[i] = e.isIntersecting;
    if (e.isIntersecting) {
      navDots.forEach(d => d.classList.remove('active'));
      navDots[i].classList.add('active');
    }
  });
}, { threshold: 0.5 });
sections.forEach(s => io.observe(s));

navDots.forEach(d => {
  d.addEventListener('click', () => {
    const i = +d.dataset.i;
    sections[i].scrollIntoView({ behavior: 'smooth' });
  });
});

/* 마우스가 현재 어느 섹션에 있는지 상대 좌표로 계산 */
function localMouse(canvas) {
  const rect = canvas.getBoundingClientRect();
  return { x: mouse.x - rect.left, y: mouse.y - rect.top };
}

/* ===================== 씬 1: Constellation ===================== */
(() => {
  const canvas = document.getElementById('c0');
  const ctx = setup(canvas);
  const N = 90;
  const pts = [];
  for (let i = 0; i < N; i++) {
    pts.push({
      x: Math.random() * innerWidth,
      y: Math.random() * innerHeight,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
    });
  }

  function draw() {
    requestAnimationFrame(draw);
    if (!active[0]) return;
    const W = innerWidth, H = innerHeight;
    ctx.fillStyle = 'rgba(10,10,18,0.35)';
    ctx.fillRect(0, 0, W, H);

    const m = localMouse(canvas);
    for (const p of pts) {
      // 마우스 인력
      const dx = m.x - p.x, dy = m.y - p.y;
      const d2 = dx * dx + dy * dy;
      if (d2 < 40000) {
        const f = (40000 - d2) / 40000 * 0.04;
        p.vx += dx / Math.sqrt(d2 + 1) * f;
        p.vy += dy / Math.sqrt(d2 + 1) * f;
      }
      p.vx *= 0.98; p.vy *= 0.98;
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    }

    // 라인
    ctx.lineWidth = 0.5;
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 140) {
          const a = (1 - d / 140) * 0.4;
          ctx.strokeStyle = `rgba(180,200,255,${a})`;
          ctx.beginPath();
          ctx.moveTo(pts[i].x, pts[i].y);
          ctx.lineTo(pts[j].x, pts[j].y);
          ctx.stroke();
        }
      }
    }
    // 마우스 연결
    for (const p of pts) {
      const dx = m.x - p.x, dy = m.y - p.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 180) {
        ctx.strokeStyle = `rgba(255,220,180,${(1 - d / 180) * 0.7})`;
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(m.x, m.y);
        ctx.stroke();
      }
    }
    // 점
    for (const p of pts) {
      ctx.fillStyle = 'rgba(220,230,255,0.9)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 1.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  draw();
})();

/* ===================== 씬 2: Ripple Field ===================== */
(() => {
  const canvas = document.getElementById('c1');
  const ctx = setup(canvas);
  const SPACING = 30;
  let cols, rows, grid;

  function build() {
    cols = Math.ceil(innerWidth / SPACING) + 2;
    rows = Math.ceil(innerHeight / SPACING) + 2;
    grid = [];
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        grid.push({
          ox: x * SPACING, oy: y * SPACING,
          x: x * SPACING, y: y * SPACING,
        });
      }
    }
  }
  build();
  window.addEventListener('resize', build);

  const ripples = [];
  window.addEventListener('click', e => {
    if (!active[1]) return;
    const rect = canvas.getBoundingClientRect();
    if (e.clientY < rect.top || e.clientY > rect.bottom) return;
    ripples.push({ x: e.clientX, y: e.clientY - rect.top, r: 0, life: 1 });
  });

  function draw() {
    requestAnimationFrame(draw);
    if (!active[1]) return;
    const W = innerWidth, H = innerHeight;
    ctx.fillStyle = 'rgba(10,10,18,1)';
    ctx.fillRect(0, 0, W, H);

    const m = localMouse(canvas);

    // 파동 업데이트
    for (let i = ripples.length - 1; i >= 0; i--) {
      ripples[i].r += 6;
      ripples[i].life -= 0.008;
      if (ripples[i].life <= 0) ripples.splice(i, 1);
    }

    for (const p of grid) {
      // 마우스 밀어내기
      let dx = p.ox - m.x, dy = p.oy - m.y;
      let d = Math.sqrt(dx * dx + dy * dy);
      let px = p.ox, py = p.oy;
      if (d < 150 && d > 0) {
        const f = (150 - d) / 150;
        px += (dx / d) * f * 25;
        py += (dy / d) * f * 25;
      }
      // 파동 영향
      for (const r of ripples) {
        const rdx = p.ox - r.x, rdy = p.oy - r.y;
        const rd = Math.sqrt(rdx * rdx + rdy * rdy);
        const diff = Math.abs(rd - r.r);
        if (diff < 40) {
          const f = (1 - diff / 40) * r.life * 20;
          px += (rdx / (rd + 1)) * f;
          py += (rdy / (rd + 1)) * f;
        }
      }
      // 부드럽게
      p.x += (px - p.x) * 0.15;
      p.y += (py - p.y) * 0.15;

      const dist = Math.hypot(p.x - p.ox, p.y - p.oy);
      const glow = Math.min(dist / 20, 1);

      ctx.fillStyle = `rgba(${180 + glow * 75},${200 + glow * 30},255,${0.3 + glow * 0.7})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 1 + glow * 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  draw();
})();

/* ===================== 씬 3: Gravity Well ===================== */
(() => {
  const canvas = document.getElementById('c2');
  const ctx = setup(canvas);
  const N = 220;
  const orbs = [];
  for (let i = 0; i < N; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 100 + Math.random() * 300;
    orbs.push({
      x: innerWidth / 2 + Math.cos(angle) * dist,
      y: innerHeight / 2 + Math.sin(angle) * dist,
      vx: -Math.sin(angle) * 1.5,
      vy: Math.cos(angle) * 1.5,
      hue: Math.random() * 60 + 200,
      trail: [],
    });
  }

  function draw() {
    requestAnimationFrame(draw);
    if (!active[2]) return;
    const W = innerWidth, H = innerHeight;
    ctx.fillStyle = 'rgba(10,10,18,0.15)';
    ctx.fillRect(0, 0, W, H);

    const m = localMouse(canvas);
    const cx = mouse.active ? m.x : W / 2;
    const cy = mouse.active ? m.y : H / 2;

    for (const o of orbs) {
      const dx = cx - o.x, dy = cy - o.y;
      const d2 = dx * dx + dy * dy;
      const d = Math.sqrt(d2);
      const force = Math.min(400 / (d2 + 100), 0.6);
      o.vx += (dx / d) * force;
      o.vy += (dy / d) * force;
      o.vx *= 0.995; o.vy *= 0.995;
      o.x += o.vx; o.y += o.vy;

      o.trail.push({ x: o.x, y: o.y });
      if (o.trail.length > 12) o.trail.shift();

      // 트레일
      ctx.strokeStyle = `hsla(${o.hue},70%,70%,0.4)`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      for (let i = 0; i < o.trail.length; i++) {
        const t = o.trail[i];
        if (i === 0) ctx.moveTo(t.x, t.y);
        else ctx.lineTo(t.x, t.y);
      }
      ctx.stroke();

      // 점
      ctx.fillStyle = `hsla(${o.hue},80%,80%,0.9)`;
      ctx.beginPath();
      ctx.arc(o.x, o.y, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // 중심 글로우
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60);
    grad.addColorStop(0, 'rgba(255,220,180,0.3)');
    grad.addColorStop(1, 'rgba(255,220,180,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, 60, 0, Math.PI * 2);
    ctx.fill();
  }
  draw();
})();

/* ===================== 씬 4: Silk Trail ===================== */
(() => {
  const canvas = document.getElementById('c3');
  const ctx = setup(canvas);
  const STRANDS = 14;
  const NODES = 26;
  const SPACING = 7;
  const GRAVITY = 0.12;
  const strands = [];

  for (let i = 0; i < STRANDS; i++) {
    const nodes = [];
    for (let j = 0; j < NODES; j++) {
      nodes.push({ x: 0, y: 0, px: 0, py: 0 });
    }
    strands.push({
      nodes,
      angle: (i / STRANDS) * Math.PI * 2,
      hue: 200 + i * 7,
    });
  }

  let target = { x: innerWidth / 2, y: innerHeight / 2 };
  let wasActive = false;

  function resetNodes() {
    const m = localMouse(canvas);
    target.x = m.x; target.y = m.y;
    for (const s of strands) {
      for (let j = 0; j < NODES; j++) {
        const x = m.x + Math.cos(s.angle) * 8;
        const y = m.y + Math.sin(s.angle) * 8 + j * SPACING;
        s.nodes[j].x = x; s.nodes[j].y = y;
        s.nodes[j].px = x; s.nodes[j].py = y;
      }
    }
  }

  function draw() {
    requestAnimationFrame(draw);
    if (!active[3]) { wasActive = false; return; }
    const W = innerWidth, H = innerHeight;

    if (!wasActive) {
      resetNodes();
      ctx.fillStyle = 'rgba(10,10,18,1)';
      ctx.fillRect(0, 0, W, H);
      wasActive = true;
    }

    ctx.fillStyle = 'rgba(10,10,18,0.18)';
    ctx.fillRect(0, 0, W, H);

    const m = localMouse(canvas);
    target.x += (m.x - target.x) * 0.22;
    target.y += (m.y - target.y) * 0.22;

    for (const s of strands) {
      // 헤드: 커서 주변에 부챗살처럼 고정
      const off = 10;
      const tx = target.x + Math.cos(s.angle) * off;
      const ty = target.y + Math.sin(s.angle) * off;
      s.nodes[0].x = tx; s.nodes[0].y = ty;
      s.nodes[0].px = tx; s.nodes[0].py = ty;

      // Verlet 적분 (헤드 제외)
      for (let i = 1; i < NODES; i++) {
        const n = s.nodes[i];
        const vx = (n.x - n.px) * 0.98;
        const vy = (n.y - n.py) * 0.98;
        n.px = n.x; n.py = n.y;
        n.x += vx;
        n.y += vy + GRAVITY;
      }

      // 거리 제약 (여러 번 반복해 안정화)
      for (let iter = 0; iter < 4; iter++) {
        for (let i = 0; i < NODES - 1; i++) {
          const a = s.nodes[i];
          const b = s.nodes[i + 1];
          const dx = b.x - a.x, dy = b.y - a.y;
          const d = Math.sqrt(dx * dx + dy * dy) || 0.001;
          const diff = (d - SPACING) / d * 0.5;
          const mx = dx * diff, my = dy * diff;
          if (i === 0) {
            b.x -= mx * 2; b.y -= my * 2;
          } else {
            a.x += mx; a.y += my;
            b.x -= mx; b.y -= my;
          }
        }
      }

      // 곡선 그리기
      ctx.strokeStyle = `hsla(${s.hue},70%,78%,0.55)`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(s.nodes[0].x, s.nodes[0].y);
      for (let i = 1; i < NODES - 1; i++) {
        const xc = (s.nodes[i].x + s.nodes[i + 1].x) / 2;
        const yc = (s.nodes[i].y + s.nodes[i + 1].y) / 2;
        ctx.quadraticCurveTo(s.nodes[i].x, s.nodes[i].y, xc, yc);
      }
      const last = s.nodes[NODES - 1];
      ctx.lineTo(last.x, last.y);
      ctx.stroke();

      // 끝점 매듭 (미묘한 하이라이트)
      ctx.fillStyle = `hsla(${s.hue},80%,85%,0.7)`;
      ctx.beginPath();
      ctx.arc(last.x, last.y, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  draw();
})();
</script>
</body>
</html>
